name: Deploy n8n + Caddy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 📁 Create Deployment Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /root/n8n-server

      - name: 📤 Copy Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,Caddyfile,librechat.yaml"
          target: "/root/n8n-server/"

      - name: 🔑 Write .env File
        uses: appleboy/ssh-action@v1.0.3
        env:
          LIBRECHAT_ALLOW_REGISTRATION: ${{ secrets.LIBRECHAT_ALLOW_REGISTRATION }}
          LIBRECHAT_CREDS_KEY: ${{ secrets.LIBRECHAT_CREDS_KEY }}
          LIBRECHAT_GOOGLE_KEY: ${{ secrets.LIBRECHAT_GOOGLE_KEY }}
          LIBRECHAT_JWT_REFRESH_SECRET: ${{ secrets.LIBRECHAT_JWT_REFRESH_SECRET }}
          LIBRECHAT_JWT_SECRET: ${{ secrets.LIBRECHAT_JWT_SECRET }}
          LIBRECHAT_MEILI_MASTER_KEY: ${{ secrets.LIBRECHAT_MEILI_MASTER_KEY }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: LIBRECHAT_ALLOW_REGISTRATION,LIBRECHAT_CREDS_KEY,LIBRECHAT_GOOGLE_KEY,LIBRECHAT_JWT_REFRESH_SECRET,LIBRECHAT_JWT_SECRET,LIBRECHAT_MEILI_MASTER_KEY,N8N_API_KEY
          script: |
            cat > /root/n8n-server/.env <<EOF
            LIBRECHAT_ALLOW_REGISTRATION=${LIBRECHAT_ALLOW_REGISTRATION}
            LIBRECHAT_CREDS_KEY=${LIBRECHAT_CREDS_KEY}
            LIBRECHAT_GOOGLE_KEY=${LIBRECHAT_GOOGLE_KEY}
            LIBRECHAT_JWT_REFRESH_SECRET=${LIBRECHAT_JWT_REFRESH_SECRET}
            LIBRECHAT_JWT_SECRET=${LIBRECHAT_JWT_SECRET}
            LIBRECHAT_MEILI_MASTER_KEY=${LIBRECHAT_MEILI_MASTER_KEY}
            N8N_API_KEY=${N8N_API_KEY}
            EOF
            chmod 600 /root/n8n-server/.env

      - name: 🚀 Start Docker Containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/n8n-server

            # Create the data volume if it doesn't exist yet
            docker volume create n8n_data || true

            # Pull the latest images and start the containers
            docker compose pull
            docker compose up -d --remove-orphans